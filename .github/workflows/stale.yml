name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          days-before-stale: 30
          days-before-close: 7
          days-before-pr-close: -1

          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed
            in 7 days unless there is new activity.
          close-issue-message: >
            Closed automatically due to inactivity.
            Feel free to reopen if this is still relevant.
          stale-pr-message: >
            This PR has been inactive for 30 days.
            Please leave a comment to keep it open.

          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          close-issue-label: 'closed-due-inactivity'

          exempt-issue-labels: 'pinned,bug,in-progress,blocked,on-hold,deferred'
          exempt-pr-labels: 'pinned,in-progress,blocked'
          exempt-all-milestones: true
          exempt-all-assignees: true

          close-issue-reason: 'not_planned'
          operations-per-run: 100
          ascending: true
