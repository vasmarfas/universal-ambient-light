name: Manual Release
run-name: Manual Release v${{ inputs.version_name }}

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Google Play Track (production, beta, alpha, internal)'
        required: true
        default: 'internal'
      status:
        description: 'Release Status (completed, draft, halted, inProgress)'
        required: true
        default: 'draft'
      version_name:
        description: 'App versionName (например 0.1.0 или 0.1.0-beta.1)'
        required: true
      release_notes_github:
        description: 'GitHub Release notes. Fields are single-line — type \n for a line break (Markdown headings/lists need them). Optional; empty = no body.'
        required: false
        default: ''
      release_notes_googleplay_en:
        description: 'Google Play What''s new — English (en-US). Max 500 chars. Type \n for a line break. Optional.'
        required: false
        default: ''
      release_notes_googleplay_ru:
        description: 'Google Play What''s new — Russian (ru-RU). Max 500 chars. Type \n for a line break. Optional.'
        required: false
        default: ''
      release_notes_rustore:
        description: 'What''s new for RuStore. Type \n for a line break. Optional; empty = no notes.'
        required: false
        default: ''
      github_publish:
        description: 'Publish the GitHub Release immediately (unchecked = draft, as before)'
        type: boolean
        required: false
        default: false
      googleplay_send_to_review:
        description: 'Send the Google Play release to review now — status=completed (unchecked = use Status field / stays draft)'
        type: boolean
        required: false
        default: false
      rustore_auto_publish:
        description: 'RuStore: auto-publish after moderation passes (unchecked = manual publish, as before)'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Gradle wrapper
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/wrapper
        key: gradle-wrapper-${{ runner.os }}-8.14.4

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $ENCODED_STRING | base64 -d > release.keystore

    - name: Decode Google Services JSON
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        echo $GOOGLE_SERVICES_JSON | base64 -d > app/google-services.json

    - name: Build Release APK and AAB
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        BUILD_NUMBER: ${{ github.run_number }}
        APP_VERSION_NAME: ${{ inputs.version_name }}
      # full flavor → APK for GitHub & RuStore (keeps the AccessibilityService features);
      # playstore flavor → AAB for Google Play (no AccessibilityService, per Play policy).
      run: ./gradlew assembleFullRelease bundlePlaystoreRelease

    - name: Upload build artifacts (APK/AAB)
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        if-no-files-found: error
        path: |
          app/build/outputs/apk/full/release/app-full-release.apk
          app/build/outputs/bundle/playstoreRelease/app-playstore-release.aab

  github_release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-release
        path: dist

    - name: Create Release Tag
      id: tag
      run: |
        echo "tag_name=v${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT

    - name: Prepare GitHub release notes
      env:
        GH_NOTES: ${{ inputs.release_notes_github }}
      run: |
        # workflow_dispatch inputs are single-line, so let "\n" stand for a line break.
        # printf '%b' expands the escapes into real newlines so Markdown (headings, lists,
        # blank lines) renders. %b leaves %, backticks and UTF-8 untouched.
        printf '%b' "$GH_NOTES" > release_body.md

    - name: Upload APK to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        name: Release ${{ github.event.inputs.version_name }}
        body_path: release_body.md
        files: |
          dist/apk/full/release/app-full-release.apk
#          dist/bundle/playstoreRelease/app-playstore-release.aab
        draft: ${{ ! inputs.github_publish }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  google_play:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-release
        path: dist

    - name: Prepare Google Play release notes
      id: gp_notes
      env:
        GP_NOTES_EN: ${{ inputs.release_notes_googleplay_en }}
        GP_NOTES_RU: ${{ inputs.release_notes_googleplay_ru }}
      run: |
        wrote=0
        mkdir -p distribution/whatsnew
        # Single-line dispatch inputs: expand "\n" into real line breaks (Play renders them).
        if [ -n "$GP_NOTES_EN" ]; then
          printf '%b' "$GP_NOTES_EN" > distribution/whatsnew/whatsnew-en-US
          echo "Wrote whatsnew-en-US"
          wrote=1
        fi
        if [ -n "$GP_NOTES_RU" ]; then
          printf '%b' "$GP_NOTES_RU" > distribution/whatsnew/whatsnew-ru-RU
          echo "Wrote whatsnew-ru-RU"
          wrote=1
        fi
        if [ "$wrote" = "1" ]; then
          echo "dir=distribution/whatsnew" >> "$GITHUB_OUTPUT"
        else
          echo "dir=" >> "$GITHUB_OUTPUT"
          echo "No Google Play notes provided; whatsNew will be skipped (as before)"
        fi

    - name: Upload to Google Play
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        packageName: com.vasmarfas.UniversalAmbientLight
        releaseFiles: dist/bundle/playstoreRelease/app-playstore-release.aab
        track: ${{ inputs.track }}
        # Checkbox on → completed + sent for review; off → use the Status field (draft by default).
        status: ${{ inputs.googleplay_send_to_review && 'completed' || inputs.status }}
        changesNotSentForReview: ${{ ! inputs.googleplay_send_to_review }}
        whatsNewDirectory: ${{ steps.gp_notes.outputs.dir }}

  rustore:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Get RuStore API token (JWE)
        env:
          RUSTORE_KEY_ID: ${{ secrets.RUSTORE_KEY_ID }}
          RUSTORE_PRIVATE_KEY: ${{ secrets.RUSTORE_PRIVATE_KEY }}
        run: |
          if [ -z "$RUSTORE_KEY_ID" ] || [ -z "$RUSTORE_PRIVATE_KEY" ]; then
          echo "RuStore key id or private key is not set"
          exit 1
          fi
          
          python -m pip install --upgrade pip
          python -m pip install pycryptodome requests
          
          python - << 'EOF'
          import os, base64, datetime, json, sys
          import requests
          from Crypto.PublicKey import RSA
          from Crypto.Signature import pkcs1_15
          from Crypto.Hash import SHA512
          
          key_id = os.getenv("RUSTORE_KEY_ID")
          private_key_b64 = os.getenv("RUSTORE_PRIVATE_KEY")
          github_env = os.getenv("GITHUB_ENV")
          
          if not key_id or not private_key_b64 or not github_env:
           print("Required env vars are not set", file=sys.stderr)
           sys.exit(1)
          
          private_key = RSA.import_key(base64.b64decode(private_key_b64))
          timestamp = datetime.datetime.now(datetime.timezone.utc).isoformat(timespec='milliseconds')
          message = key_id + timestamp
          
          h = SHA512.new(message.encode())
          signer = pkcs1_15.new(private_key)
          signature = base64.b64encode(signer.sign(h)).decode()
          
          body = {"keyId": key_id, "timestamp": timestamp, "signature": signature}
          print("RuStore auth request body:", json.dumps(body, ensure_ascii=False), file=sys.stderr)
          
          resp = requests.post(
           "https://public-api.rustore.ru/public/auth",
           headers={"Content-Type": "application/json"},
           data=json.dumps(body),
           timeout=10,
          )
          
          print("RuStore auth raw response:", resp.text, file=sys.stderr)
          data = resp.json()
          
          if data.get("code") != "OK":
           print(f"RuStore auth failed, code={data.get('code')}, message={data.get('message')}", file=sys.stderr)
           sys.exit(1)
          
          jwe = data.get("body", {}).get("jwe")
          if not jwe:
           print("No jwe in auth response body", file=sys.stderr)
           sys.exit(1)
          
          with open(github_env, "a", encoding="utf-8") as f:
           f.write(f"RUSTORE_JWE={jwe}\n")
          EOF

      - name: Create draft version in RuStore
        env:
          RUSTORE_JWE: ${{ env.RUSTORE_JWE }}
          PACKAGE_NAME: com.vasmarfas.UniversalAmbientLight
          APP_VERSION_NAME: ${{ github.event.inputs.version_name }}
          RUSTORE_NOTES: ${{ inputs.release_notes_rustore }}
          RUSTORE_PUBLISH_TYPE: ${{ inputs.rustore_auto_publish && 'INSTANTLY' || 'MANUAL' }}
        run: |
          # Build the body with jq so the (optional, possibly multi-line) notes are safely escaped.
          # whatsNew is added only when provided — otherwise the body is identical to before.
          # publishType: INSTANTLY = auto-publish after moderation, MANUAL = publish by hand.
          # Single-line dispatch input: expand "\n" into real line breaks before jq encodes it.
          WHATS_NEW=$(printf '%b' "$RUSTORE_NOTES")
          BODY=$(jq -n \
            --arg publishType "$RUSTORE_PUBLISH_TYPE" \
            --arg whatsNew "$WHATS_NEW" \
            '{minAndroidVersion: 8, publishType: $publishType}
             + (if $whatsNew == "" then {} else {whatsNew: $whatsNew} end)')
          echo "RuStore draft request body: $BODY"
          RESPONSE=$(curl -s -X POST "https://public-api.rustore.ru/public/v1/application/${PACKAGE_NAME}/version" \
            -H "Content-Type: application/json" \
            -H "Public-Token: ${RUSTORE_JWE}" \
            -d "$BODY")
          echo "RuStore draft response: $RESPONSE"
          DRAFT_CODE=$(echo "$RESPONSE" | jq -r '.code // empty')
          MESSAGE=$(echo "$RESPONSE" | jq -r '.message // ""')

          if [ "$DRAFT_CODE" = "OK" ]; then
            VERSION_ID=$(echo "$RESPONSE" | jq -r '.body')
          elif [ "$DRAFT_CODE" = "ERROR" ] && echo "$MESSAGE" | grep -q 'You already have draft version with ID ='; then
            # выдёргиваем ID из сообщения вида "You already have draft version with ID = 2064472977"
            VERSION_ID=$(echo "$MESSAGE" | sed -E 's/.*ID = ([0-9]+).*/\1/')
            echo "Reusing existing RuStore draft versionId: $VERSION_ID"
          else
            echo "RuStore draft failed, code=$DRAFT_CODE, message=$MESSAGE"
            exit 1
          fi

          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "null" ]; then
            echo "Failed to parse versionId from RuStore response"
            exit 1
          fi
          echo "RUSTORE_VERSION_ID=$VERSION_ID" >> $GITHUB_ENV

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: dist

      - name: Upload APK to RuStore
        env:
          RUSTORE_JWE: ${{ env.RUSTORE_JWE }}
          PACKAGE_NAME: com.vasmarfas.UniversalAmbientLight
          RUSTORE_VERSION_ID: ${{ env.RUSTORE_VERSION_ID }}
        run: |
          # Ищем APK файл в разных возможных местах (full flavor — с AccessibilityService)
          APK_PATH=""
          for path in "dist/apk/full/release/app-full-release.apk" "dist/app/build/outputs/apk/full/release/app-full-release.apk" "dist/app-full-release.apk"; do
            if [ -f "$path" ]; then
              APK_PATH="$path"
              break
            fi
          done
          
          # Если не нашли, ищем любой APK файл
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find dist -name "*.apk" -type f | head -n1)
          fi
          
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "APK file not found"
            echo "Available files in dist:"
            find dist -type f || true
            exit 1
          fi
          
          echo "Uploading APK: $APK_PATH ($(du -h "$APK_PATH" | cut -f1))"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://public-api.rustore.ru/public/v1/application/${PACKAGE_NAME}/version/${RUSTORE_VERSION_ID}/apk?servicesType=Unknown&isMainApk=true" \
            -H "Public-Token: ${RUSTORE_JWE}" \
            -F "file=@${APK_PATH}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "RuStore upload response (HTTP $HTTP_CODE): $BODY"
          
          # Проверяем, не является ли ошибка "APK already uploaded"
          MESSAGE=$(echo "$BODY" | jq -r '.message // ""')
          CODE=$(echo "$BODY" | jq -r '.code // empty')
          
          if [ "$HTTP_CODE" = "400" ] && echo "$MESSAGE" | grep -qi "already uploaded"; then
            echo "APK file is already uploaded to this version, skipping upload"
            echo "This is not an error - the APK was uploaded in a previous run"
          elif [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "RuStore upload failed with HTTP $HTTP_CODE"
            echo "$BODY" | jq '.' || echo "$BODY"
            exit 1
          elif [ "$CODE" != "OK" ] && [ -n "$CODE" ]; then
            # Проверяем, не является ли это ошибкой "already uploaded"
            if echo "$MESSAGE" | grep -qi "already uploaded"; then
              echo "APK file is already uploaded to this version, skipping upload"
              echo "This is not an error - the APK was uploaded in a previous run"
            else
              echo "RuStore upload failed, code=$CODE"
              echo "$BODY" | jq '.' || echo "$BODY"
              exit 1
            fi
          else
            echo "RuStore APK uploaded successfully"
          fi

      - name: Set RuStore publication settings
        env:
          RUSTORE_JWE: ${{ env.RUSTORE_JWE }}
          PACKAGE_NAME: com.vasmarfas.UniversalAmbientLight
          RUSTORE_VERSION_ID: ${{ env.RUSTORE_VERSION_ID }}
          RUSTORE_PUBLISH_TYPE: ${{ inputs.rustore_auto_publish && 'INSTANTLY' || 'MANUAL' }}
        run: |
          # Enforce publishType on the (possibly reused) draft. publishType is only
          # applied at draft creation — when an existing draft is reused ("You already
          # have draft version with ID = ..."), this run's value was never set, so an
          # intended INSTANTLY release kept the draft's old MANUAL type and got stuck
          # waiting for a manual "Publish" in the console. This call makes it deterministic.
          # Must run after the APK upload and before commit (send to moderation).
          BODY=$(jq -n --arg publishType "$RUSTORE_PUBLISH_TYPE" '{publishType: $publishType}')
          RESPONSE=$(curl -s -X POST "https://public-api.rustore.ru/public/v1/application/${PACKAGE_NAME}/version/${RUSTORE_VERSION_ID}/publish-settings" \
            -H "Content-Type: application/json" \
            -H "Public-Token: ${RUSTORE_JWE}" \
            -d "$BODY")
          echo "RuStore publish-settings response: $RESPONSE"
          CODE=$(echo "$RESPONSE" | jq -r '.code // empty')
          if [ "$CODE" != "OK" ]; then
            echo "RuStore publish-settings failed, code=$CODE"
            exit 1
          fi

      - name: Commit RuStore version (send to moderation)
        env:
          RUSTORE_JWE: ${{ env.RUSTORE_JWE }}
          PACKAGE_NAME: com.vasmarfas.UniversalAmbientLight
          RUSTORE_VERSION_ID: ${{ env.RUSTORE_VERSION_ID }}
        run: |
          RESPONSE=$(curl -s -X POST "https://public-api.rustore.ru/public/v1/application/${PACKAGE_NAME}/version/${RUSTORE_VERSION_ID}/commit?priorityUpdate=0" \
            -H "Public-Token: ${RUSTORE_JWE}")
          echo "RuStore commit response: $RESPONSE"
          CODE=$(echo "$RESPONSE" | jq -r '.code // empty')
          if [ "$CODE" != "OK" ]; then
            echo "RuStore commit failed, code=$CODE"
            exit 1
          fi